services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: debug_bot_tgh
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/debug_bot_tgh
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file:
      - bot/.env
    environment:
      BACKEND_API_URL: http://backend:4000/api/v1
    depends_on:
      - backend

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  pgdata:
